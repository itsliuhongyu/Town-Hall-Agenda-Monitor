name: Weekly Agenda Pipeline

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: self-hosted

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pandas requests playwright openai pdfplumber python-docx beautifulsoup4
          python3 -m playwright install chromium

      - name: Run pipeline
        run: python3 pipeline.py

      - name: Commit and push results
        run: |
          git config user.name "Agenda Bot"
          git config user.email "agenda-bot@users.noreply.github.com"
          git add high.csv medium.csv low.csv
          git diff --cached --quiet || git commit -m "Weekly agenda results - $(date +'%Y-%m-%d')"
          git push

      - name: Email high.csv
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: Agenda Bot <${{ secrets.MAIL_USERNAME }}>
          subject: "Weekly High-Priority Agenda Items - ${{ github.run_id }}"
          body: |
            Hi,

            Attached is this week's high-priority agenda items.
          attachments: high.csv
